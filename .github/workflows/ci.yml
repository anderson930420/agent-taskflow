name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-test-correction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/validator-managed-process
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply timeout test correction
        run: python scripts/_pr9_apply_validator_process.py

      - name: Restore standard CI and commit
        shell: bash
        run: |
          cat > .github/workflows/ci.yml <<'EOF'
          name: CI

          on:
            pull_request:
            push:
              branches:
                - main

          jobs:
            test:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4

                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"

                - name: Install package and dependencies
                  run: python -m pip install -e .

                - name: Run unit tests
                  run: PYTHONPATH=. python -m unittest discover -s tests

                - name: Compile sources
                  run: PYTHONPATH=. python -m compileall agent_taskflow scripts tests
          EOF
          git config user.name "agent-taskflow-ci"
          git config user.email "agent-taskflow-ci@example.invalid"
          git add -A
          git diff --cached --check
          git commit -m "Correct validator timeout regression command"
          git push origin HEAD:agent/validator-managed-process
