name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  harden-executor-launch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/executor-process-lifecycle
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply PR-7 executor launch hardening
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/_pr7_harden_executor_launch.py")
          text = path.read_text(encoding="utf-8")
          old = 'terminate_end = text.index("def _write_preamble(\\n", terminate_start)'
          new = 'terminate_end = text.index("def _write_preamble(", terminate_start)'
          if old not in text:
              raise SystemExit("hardening anchor-fix target missing")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          python scripts/_pr7_harden_executor_launch.py

      - name: Commit hardening and restore standard CI
        shell: bash
        run: |
          git config user.name "agent-taskflow-ci"
          git config user.email "agent-taskflow-ci@example.invalid"
          git add -A
          git diff --cached --check
          git commit -m "Harden executor process identity and termination races"
          git push origin HEAD:agent/executor-process-lifecycle
