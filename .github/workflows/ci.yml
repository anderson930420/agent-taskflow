name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dependencies
        run: python -m pip install -e .

      - name: Run PR handoff diagnostic
        shell: bash
        run: |
          set +e
          rm -rf /tmp/pr5-handoff-diagnostic
          PYTHONPATH=. python scripts/run_pr_handoff_golden_path_smoke.py \
            --workspace-root /tmp/pr5-handoff-diagnostic \
            2>&1 | tee unittest.log
          smoke_status=${PIPESTATUS[0]}
          {
            echo
            echo '=== generated handoff files ==='
            find /tmp/pr5-handoff-diagnostic -path '*pr-handoff*' -type f -print -exec sh -c 'echo --- "$1"; cat "$1"' _ {} \; 2>/dev/null || true
            echo
            echo '=== git worktrees and status ==='
            git -C /tmp/pr5-handoff-diagnostic/repo worktree list --porcelain 2>&1 || true
            while IFS= read -r gitfile; do
              wt=${gitfile%/.git}
              echo "--- $wt"
              git -C "$wt" status --short 2>&1 || true
              git -C "$wt" diff --name-only 2>&1 || true
            done < <(find /tmp/pr5-handoff-diagnostic/repo/.worktrees -name .git -type f 2>/dev/null | sort)
          } 2>&1 | tee -a unittest.log
          exit "$smoke_status"

      - name: Upload unittest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unittest-diagnostics
          path: |
            unittest.log
            /tmp/pr5-handoff-diagnostic
          if-no-files-found: error
