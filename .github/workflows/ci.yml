name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize-pr8-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/reset-lineage-cas
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply PR-8 compatibility updates
        run: python scripts/_pr8_finalize_core.py

      - name: Commit finalized reset contracts and restore CI
        shell: bash
        run: |
          git config user.name "agent-taskflow-ci"
          git config user.email "agent-taskflow-ci@example.invalid"
          git add -A
          git diff --cached --check
          git commit -m "Finalize reset lineage compatibility contracts"
          git push origin HEAD:agent/reset-lineage-cas
