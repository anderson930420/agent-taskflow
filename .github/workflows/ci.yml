name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize-pr8-regressions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/reset-lineage-cas
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply final PR-8 regression fixes
        run: python scripts/_pr8_fix_final_regressions.py

      - name: Commit fixes and restore standard CI
        shell: bash
        run: |
          git config user.name "agent-taskflow-ci"
          git config user.email "agent-taskflow-ci@example.invalid"
          git add -A
          git diff --cached --check
          git commit -m "Fix reset lineage compatibility regressions"
          git push origin HEAD:agent/reset-lineage-cas
