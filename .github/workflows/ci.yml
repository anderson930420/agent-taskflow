name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dependencies
        run: python -m pip install -e .

      - name: Run unit tests
        run: |
          set +e
          PYTHONPATH=. python -m unittest discover -s tests > unittest.log 2>&1
          status=$?
          cat unittest.log
          exit "$status"

      - name: Upload unittest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m1a-unittest-log
          path: unittest.log
          if-no-files-found: error

      - name: Compile sources
        run: PYTHONPATH=. python -m compileall agent_taskflow scripts tests
