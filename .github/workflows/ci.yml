name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export PR-5 source files
        uses: actions/upload-artifact@v4
        with:
          name: pr5-source-snapshot
          path: |
            scripts/run_issue_to_waiting_approval_smoke.py
          if-no-files-found: error
