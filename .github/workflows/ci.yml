name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch-claude-managed-launch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/executor-process-lifecycle
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply PR-7 Claude Code managed-launch patch
        run: python scripts/_pr7_patch_claude_managed_launch.py

      - name: Commit patch and restore standard CI
        shell: bash
        run: |
          git config user.name "agent-taskflow-ci"
          git config user.email "agent-taskflow-ci@example.invalid"
          git add -A
          git diff --cached --check
          git commit -m "Route Claude Code through managed executor process groups"
          git push origin HEAD:agent/executor-process-lifecycle
