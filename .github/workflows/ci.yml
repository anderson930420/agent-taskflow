name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-validator-process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/validator-managed-process
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply PR-9 integration patch
        shell: bash
        run: |
          set +e
          python scripts/_pr9_apply_validator_process.py 2>&1 | tee patch.log
          patch_status=${PIPESTATUS[0]}
          if [ "$patch_status" -eq 0 ]; then
            cat > .github/workflows/ci.yml <<'EOF'
          name: CI

          on:
            pull_request:
            push:
              branches:
                - main

          jobs:
            test:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4

                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"

                - name: Install package and dependencies
                  run: python -m pip install -e .

                - name: Run unit tests
                  run: PYTHONPATH=. python -m unittest discover -s tests

                - name: Compile sources
                  run: PYTHONPATH=. python -m compileall agent_taskflow scripts tests
          EOF
          fi
          exit "$patch_status"

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validator-process-patch-diagnostics
          path: patch.log
          if-no-files-found: error

      - name: Commit integrated validator process changes
        shell: bash
        run: |
          git config user.name "agent-taskflow-ci"
          git config user.email "agent-taskflow-ci@example.invalid"
          git add -A
          git diff --cached --check
          git commit -m "Integrate managed validator process groups"
          git push origin HEAD:agent/validator-managed-process
